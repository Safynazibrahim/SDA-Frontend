<div class="container py-3">
  <!-- Back + Title -->
  <div class="d-flex align-items-center mb-2">
        <p class="mb-0 route">{{ 'Clinic' | translate }}</p>

    <a [routerLink]="['/dashboard/clinics']" class="m-0 p-0 text-black mt-1 mx-1 clinicActive arrow-color" style="cursor:pointer;">
      <mat-icon>keyboard_arrow_left</mat-icon>
    </a>
    <p class="mb-0 clinicActive">{{ 'Join Clinics' | translate }}</p>
  </div>
 <div class="search-wrapper d-flex justify-content-center mb-3">
  <div class="search-box">
    <mat-icon class="search-icon">search</mat-icon>
    <input
      type="text"
      [(ngModel)]="searchText"
      class="search-input"
      placeholder="Find clinics within 20 km around you"
    />
    <button class="search-btn" (click)="searchClinics()">
      {{ 'Search' | translate }}
    </button>
  </div>
</div>

<!-- Clinic List -->
<div *ngFor="let clinic of clinics" class="clinic-card d-flex justify-content-between align-items-center p-3 mb-3 shadow-sm">
  <div>
    <h6 class="mb-1 clinicName">{{ clinic.name }}</h6>
    <small class="text-muted">
      <mat-icon inline>location_on</mat-icon>
      <span class="ms-1 clinic-address">{{ clinic.address || 'No address available' }}</span>
    </small>
  </div>
  <div>
    <button class="btn btn-outline-owner me-2">Owner</button>
    <button class="btn btn-outline-subowner me-2">Sub-Owner</button>
    <button class="btn btn-outline-operator">Operator</button>
  </div>
</div>

</div>
