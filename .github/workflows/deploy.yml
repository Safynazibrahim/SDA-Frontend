name: Build and Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Inject secrets safely
        run: |
          python3 - <<EOF
          import os
          files = [
            'src/environments/environment.ts',
            'src/environments/environment.prod.ts'
          ]
          replacements = {
            "__GEMINI_API_KEY__": os.environ.get("GEMINI_API_KEY", "").strip(),
            "__FIREBASE_API_KEY__": os.environ.get("FIREBASE_API_KEY", "").strip(),
            "__FIREBASE_APP_ID__": os.environ.get("FIREBASE_APP_ID", "").strip(),
            "__FIREBASE_MEASUREMENT__": os.environ.get("FIREBASE_MEASUREMENT", "").strip(),
            "__VAPID_KEY__": os.environ.get("VAPID_KEY", "").strip(),
          }
          for file in files:
            with open(file, "r") as f:
              content = f.read()
            for key, value in replacements.items():
              content = content.replace(key, value)
            with open(file, "w") as f:
              f.write(content)
          print("Done!")
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT: ${{ secrets.FIREBASE_MEASUREMENT }}
          VAPID_KEY: ${{ secrets.VAPID_KEY }}

      - name: Build Angular
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: ./dist/sda
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}