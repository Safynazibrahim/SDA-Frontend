name: Build and Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install envsubst
        run: sudo apt-get install -y gettext-base

      - name: Inject secrets
        run: |
          python3 -c "
          import re, os
          files = ['src/environments/environment.ts', 'src/environments/environment.prod.ts']
          replacements = {
            '\$GEMINI_API_KEY': os.environ['GEMINI_API_KEY'],
            '\$FIREBASE_API_KEY': os.environ['FIREBASE_API_KEY'],
            '\$FIREBASE_APP_ID': os.environ['FIREBASE_APP_ID'],
            '\$FIREBASE_MEASUREMENT': os.environ['FIREBASE_MEASUREMENT'],
            '\$VAPID_KEY': os.environ['VAPID_KEY'],
          }
          for f in files:
            content = open(f).read()
            for k, v in replacements.items():
              content = content.replace(k, v)
            open(f, 'w').write(content)
          print('Done!')
          "
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT: ${{ secrets.FIREBASE_MEASUREMENT }}
          VAPID_KEY: ${{ secrets.VAPID_KEY }}

      - name: Build Angular
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist/sda/browser
          vercel-args: '--prod'